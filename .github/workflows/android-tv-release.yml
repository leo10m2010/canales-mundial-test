name: Android TV Signed Release

on:
  workflow_dispatch:
  push:
    tags:
      - "android-tv-v*"

permissions:
  contents: write

concurrency:
  group: android-tv-release
  cancel-in-progress: false

jobs:
  release:
    name: Build signed release APK
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: android-tv-release

    defaults:
      run:
        working-directory: android-tv

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Java 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Validate trusted release ref
        shell: bash
        run: |
          git fetch origin main --no-tags
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" && "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "Manual releases must run from main." >&2
            exit 1
          fi
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Release commit must belong to main." >&2
            exit 1
          fi

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          test -n "$KEYSTORE_BASE64"
          umask 077
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/mundial-plus-release.jks"

      - name: Build signed release APK
        env:
          ORG_GRADLE_PROJECT_RELEASE_STORE_FILE: ${{ runner.temp }}/mundial-plus-release.jks
          ORG_GRADLE_PROJECT_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ORG_GRADLE_PROJECT_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:lintVitalRelease :app:assembleRelease --build-cache --stacktrace

      - name: Verify signature and version
        id: release
        shell: bash
        run: |
          apk="app/build/outputs/apk/release/app-release.apk"
          version="$(sed -n 's/^[[:space:]]*versionName "\([^"]*\)"/\1/p' app/build.gradle)"
          tag="android-tv-v$version"
          apksigner="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          test -f "$apk"
          test -n "$version"
          test -x "$apksigner"
          "$apksigner" verify --verbose --print-certs "$apk" | tee "$RUNNER_TEMP/signature.txt"
          grep -Fi "6f1c6a05227c5841e2ceb7e6ccee1396bc6e2f764106d18497b4a6689c28e876" "$RUNNER_TEMP/signature.txt"
          if [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" != "$tag" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match version $tag" >&2
            exit 1
          fi
          output="mundial-plus-android-tv-v${version}.apk"
          cp "$apk" "$output"
          sha256sum "$output" > "$output.sha256"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "apk=$output" >> "$GITHUB_OUTPUT"

      - name: Upload signed APK artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mundial-plus-android-tv-v${{ steps.release.outputs.version }}
          path: |
            android-tv/${{ steps.release.outputs.apk }}
            android-tv/${{ steps.release.outputs.apk }}.sha256
          if-no-files-found: error
          compression-level: 0
          retention-days: 90

      - name: Publish immutable GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
          APK: ${{ steps.release.outputs.apk }}
        shell: bash
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; bump versionName and versionCode." >&2
            exit 1
          fi
          gh release create "$TAG" "$APK" "$APK.sha256" \
            --target "$GITHUB_SHA" \
            --title "Mundial+ Android TV v$VERSION" \
            --notes "APK de producción firmada para Android TV. Las instalaciones debug anteriores deben desinstalarse una vez antes de instalar esta versión."

      - name: Remove decoded keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/mundial-plus-release.jks"
