name: Android TV APK

on:
  push:
    paths:
      - "android-tv/**"
      - ".github/workflows/android-tv.yml"
  pull_request:
    paths:
      - "android-tv/**"
      - ".github/workflows/android-tv.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-tv-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: android-tv

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Test, lint, and build APK
        run: ./gradlew :app:testDebugUnitTest :app:lintDebug :app:assembleDebug --build-cache --stacktrace

      - name: Upload Android TV APK
        uses: actions/upload-artifact@v7
        with:
          name: mundial-plus-android-tv-debug
          path: android-tv/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

      - name: Prepare versioned APK
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        id: release
        shell: bash
        run: |
          version="$(sed -n 's/^[[:space:]]*versionName "\([^"]*\)"/\1/p' app/build.gradle)"
          test -n "$version"
          apk="mundial-plus-android-tv-v${version}.apk"
          cp app/build/outputs/apk/debug/app-debug.apk "$apk"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=android-tv-v$version" >> "$GITHUB_OUTPUT"
          echo "apk=$apk" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
          APK: ${{ steps.release.outputs.apk }}
        shell: bash
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$APK" --clobber
          else
            gh release create "$TAG" "$APK" \
              --target "$GITHUB_SHA" \
              --title "Mundial+ Android TV v$VERSION" \
              --notes "APK instalable de Mundial+ para Android TV."
          fi
