name: Android TV APK

on:
  push:
    paths:
      - "android-tv/**"
      - ".github/workflows/android-tv.yml"
  pull_request:
    paths:
      - "android-tv/**"
      - ".github/workflows/android-tv.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-tv-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: android-tv

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Test, lint, and build APK
        run: ./gradlew :app:testDebugUnitTest :app:lintDebug :app:assembleDebug --build-cache --stacktrace

      - name: Upload Android TV APK
        uses: actions/upload-artifact@v4
        with:
          name: mundial-plus-android-tv-debug
          path: android-tv/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          compression-level: 0
          retention-days: 30
