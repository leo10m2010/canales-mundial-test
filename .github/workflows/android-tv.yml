name: Android TV APK

on:
  push:
    paths:
      - "android-tv/**"
      - "index.html"
      - "script.js"
      - "styles.css"
      - "icon.svg"
      - "netlify.toml"
      - ".github/workflows/android-tv.yml"
  pull_request:
    paths:
      - "android-tv/**"
      - "index.html"
      - "script.js"
      - "styles.css"
      - "icon.svg"
      - "netlify.toml"
      - ".github/workflows/android-tv.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-tv-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: android-tv

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Java 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Test, lint, and build APK
        run: ./gradlew :app:testDebugUnitTest :app:lintDebug :app:assembleDebug --build-cache --stacktrace

      - name: Upload Android TV APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mundial-plus-android-tv-debug
          path: android-tv/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          compression-level: 0
          retention-days: 30
